<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 300">
  <!-- Book cover background -->
  <defs>
    <linearGradient id="bookGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e5e7eb;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d1d5db;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Main cover -->
  <rect width="200" height="300" fill="url(#bookGradient)" />

  <!-- Decorative border -->
  <rect x="10" y="10" width="180" height="280" fill="none" stroke="#9ca3af" stroke-width="2" />

  <!-- Book icon -->
  <g transform="translate(100, 130)">
    <!-- Book pages -->
    <path d="M -20 -15 L -20 15 L 0 15 L 0 -15 Z" fill="#f3f4f6" stroke="#6b7280" stroke-width="1.5"/>
    <path d="M 0 -15 L 0 15 L 20 15 L 20 -15 Z" fill="#fff" stroke="#6b7280" stroke-width="1.5"/>

    <!-- Spine -->
    <line x1="0" y1="-15" x2="0" y2="15" stroke="#6b7280" stroke-width="2"/>

    <!-- Page lines -->
    <line x1="-15" y1="-8" x2="-5" y2="-8" stroke="#d1d5db" stroke-width="1"/>
    <line x1="-15" y1="-2" x2="-5" y2="-2" stroke="#d1d5db" stroke-width="1"/>
    <line x1="-15" y1="4" x2="-5" y2="4" stroke="#d1d5db" stroke-width="1"/>
    <line x1="-15" y1="10" x2="-5" y2="10" stroke="#d1d5db" stroke-width="1"/>

    <line x1="5" y1="-8" x2="15" y2="-8" stroke="#d1d5db" stroke-width="1"/>
    <line x1="5" y1="-2" x2="15" y2="-2" stroke="#d1d5db" stroke-width="1"/>
    <line x1="5" y1="4" x2="15" y2="4" stroke="#d1d5db" stroke-width="1"/>
    <line x1="5" y1="10" x2="15" y2="10" stroke="#d1d5db" stroke-width="1"/>
  </g>

  <!-- Text at bottom -->
  <text x="100" y="270" font-size="12" font-family="sans-serif" fill="#6b7280" text-anchor="middle">No Cover</text>
</svg>
